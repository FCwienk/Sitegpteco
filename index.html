<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelo Premium Pintor</title>

<style>
body{font-family:Arial,sans-serif;margin:0;color:#222}
.container{max-width:1100px;margin:auto;padding:20px}
.hero{background:#111;color:#fff;padding:80px 20px;text-align:center}
.hero h1{font-size:32px;margin-bottom:10px}
.hero p{opacity:.9;margin-bottom:20px}
.btn{display:inline-block;background:#25D366;color:#fff;padding:15px 25px;border-radius:30px;text-decoration:none;font-weight:bold}
.section{padding:60px 20px;text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:25px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.dark{background:#111;color:#fff}
.testimonial{font-style:italic}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;padding:15px 20px;border-radius:50px;font-weight:bold}
</style>
</head>
<body>

<script>
const CONFIG={
nome:"Carlos Pintor",
cidade:"Belo Horizonte",
telefone:"5531999999999",
msg:"Olá, quero um orçamento",
servicos:["Pintura residencial","Cimento queimado","Efeito mármore","Grafiato"],
depoimentos:[
"Serviço impecável, super recomendo",
"Pontual e deixou tudo limpo",
"Melhor pintor que já contratei"
]
}
</script>

<section class="hero">
<h1 id="headline"></h1>
<p>Sem sujeira • Prazo garantido • Acabamento profissional</p>
<a id="btnHero" class="btn">Pedir orçamento no WhatsApp</a>
</section>

<section class="section">
<h2>Serviços</h2>
<div class="cards" id="servicos"></div>
</section>

<section class="section dark">
<h2>Por que escolher</h2>
<div class="cards">
<div class="card">✔ Sem sujeira</div>
<div class="card">✔ Cumpre prazo</div>
<div class="card">✔ Preço justo</div>
</div>
</section>

<section class="section">
<h2>Depoimentos</h2>
<div class="cards" id="depoimentos"></div>
</section>

<section class="section dark">
<h2>Peça seu orçamento agora</h2>
<form id="form">
<input type="text" id="nome" placeholder="Seu nome" required><br><br>
<select id="servico"></select><br><br>
<button class="btn">Receber orçamento</button>
</form>
</section>

<a id="btnFloat" class="whatsapp">WhatsApp</a>

<script>
// headline
document.getElementById("headline").innerText=`Pintor em ${CONFIG.cidade} com acabamento profissional`;

// whatsapp
const link=`https://wa.me/${CONFIG.telefone}?text=${encodeURIComponent(CONFIG.msg)}`;
document.getElementById("btnHero").href=link;
document.getElementById("btnFloat").href=link;

// serviços
const servicosDiv=document.getElementById("servicos");
const select=document.getElementById("servico");
CONFIG.servicos.forEach(s=>{
servicosDiv.innerHTML+=`<div class="card">${s}</div>`;
select.innerHTML+=`<option>${s}</option>`;
});

// depoimentos
const depDiv=document.getElementById("depoimentos");
CONFIG.depoimentos.forEach(d=>{
depDiv.innerHTML+=`<div class="card testimonial">"${d}"</div>`;
});

// form
document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();
const nome=document.getElementById("nome").value;
const servico=document.getElementById("servico").value;
const msg=`Olá, meu nome é ${nome} e quero orçamento de ${servico}`;
window.open(`https://wa.me/${CONFIG.telefone}?text=${encodeURIComponent(msg)}`);
});
</script>

</body>
</html>
